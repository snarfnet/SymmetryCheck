name: SymmetryCheck
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  SymmetryCheck:
    type: application
    platform: iOS
    sources: [SymmetryCheck]
    settings:
      base:
        PRODUCT_NAME: SymmetryCheck
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.symmetrycheck
        INFOPLIST_FILE: SymmetryCheck/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme: {}
