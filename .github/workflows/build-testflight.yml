name: Build and Upload to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: symmetrycheck-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set up ASC API Key and keychain
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          ASC_KEY_ID="WDXGY9WX55"

          # Setup keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # Setup ASC API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Create distribution certificate
        run: |
          ASC_KEY_ID="WDXGY9WX55"
          ASC_ISSUER_ID="2be0734f-943a-4d61-9dc9-5d9045c46fec"
          ASC_P8_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

          # Generate CSR and private key
          openssl req -new -newkey rsa:2048 -nodes \
            -keyout /tmp/dist.key -out /tmp/dist.csr \
            -subj "/CN=SymmetryCheck Distribution/O=tokyonasu"

          # Use xcrun to create certificate via ASC
          # First try building - xcodebuild with automatic signing will handle cert creation
          echo "Certificate will be managed by automatic signing"

      - name: Build Archive
        run: |
          ASC_KEY_ID="WDXGY9WX55"
          ASC_ISSUER_ID="2be0734f-943a-4d61-9dc9-5d9045c46fec"
          ASC_P8_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

          xcodebuild archive \
            -project SymmetryCheck.xcodeproj \
            -scheme SymmetryCheck \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/SymmetryCheck.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=83VGKGSQUH \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_P8_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Export IPA
        run: |
          ASC_KEY_ID="WDXGY9WX55"
          ASC_ISSUER_ID="2be0734f-943a-4d61-9dc9-5d9045c46fec"
          ASC_P8_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

          cat > $RUNNER_TEMP/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>83VGKGSQUH</string>
              <key>destination</key>
              <string>upload</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SymmetryCheck.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/export_options.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_P8_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to App Store Connect
        run: |
          ASC_KEY_ID="WDXGY9WX55"
          ASC_ISSUER_ID="2be0734f-943a-4d61-9dc9-5d9045c46fec"
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/SymmetryCheck.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
