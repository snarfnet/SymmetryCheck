name: Build and Upload to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: symmetrycheck-build
  cancel-in-progress: true

jobs:
  upload-testflight:
    runs-on: macos-15
    env:
      APP_BUNDLE_ID: com.tokyonasu.symmetrycheck
      BUNDLE_NAME: SymmetryCheck
      PROFILE_NAME: "SymmetryCheck App Store"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version

      - name: Install tools
        run: |
          brew install xcodegen
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install pyjwt cryptography requests

      - name: Write App Store Connect key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_KEY_ID_SECRET: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID_SECRET: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          ASC_KEY_ID="${ASC_KEY_ID_SECRET:-WDXGY9WX55}"
          ASC_ISSUER_ID="${ASC_ISSUER_ID_SECRET:-2be0734f-943a-4d61-9dc9-5d9045c46fec}"
          echo "ASC_KEY_ID=$ASC_KEY_ID" >> "$GITHUB_ENV"
          echo "ASC_ISSUER_ID=$ASC_ISSUER_ID" >> "$GITHUB_ENV"
          mkdir -p /tmp/asc "$HOME/.appstoreconnect/private_keys"
          if [ -n "$ASC_PRIVATE_KEY" ]; then
            printf '%s' "$ASC_PRIVATE_KEY" > "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8"
          else
            printf '%s' "$ASC_API_KEY_CONTENT" | base64 --decode > "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8"
          fi
          cp "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8" /tmp/asc_key.p8
          cp "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Create distribution certificate
        env:
          ASC_P8_PATH: /tmp/asc_key.p8
          BUILD_KEYCHAIN: build.keychain
          KEYCHAIN_PASSWORD: temporary-keychain-password
          REPLACE_DISTRIBUTION_CERTIFICATE: "1"
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          . .venv/bin/activate
          python scripts/create_distribution_certificate.py | tee /tmp/cert.log
          grep '^IOS_DISTRIBUTION_CERT_SHA1=' /tmp/cert.log >> "$GITHUB_ENV" || true

      - name: Prepare provisioning profile
        env:
          ASC_P8_PATH: /tmp/asc_key.p8
          BUNDLE_ID: ${{ env.APP_BUNDLE_ID }}
        run: |
          . .venv/bin/activate
          python scripts/prepare_profile.py

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set build number
        run: |
          BUILD_NUM=$(( GITHUB_RUN_NUMBER + 100 ))
          echo "BUILD_NUM=$BUILD_NUM" >> "$GITHUB_ENV"

      - name: Archive
        env:
          ASC_P8_PATH: /tmp/asc_key.p8
        run: |
          xcodebuild archive \
            -project SymmetryCheck.xcodeproj \
            -scheme SymmetryCheck \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SymmetryCheck.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_P8_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=83VGKGSQUH \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUM"

      - name: Export IPA
        env:
          ASC_P8_PATH: /tmp/asc_key.p8
        run: |
          /usr/libexec/PlistBuddy -c "Delete :provisioningProfiles" export_options.plist || true
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" export_options.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$APP_BUNDLE_ID string $PROFILE_NAME" export_options.plist
          xcodebuild -exportArchive \
            -archivePath build/SymmetryCheck.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist export_options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_P8_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/export/SymmetryCheck.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
